<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sessão | GymSoft</title>
    <link rel="icon" href="../../assets/img/logo.png" type="image/png" />
    <link rel="stylesheet" href="../../assets/css/main.css" />
    <link rel="stylesheet" href="./signIn.css" />
</head>

<body>
    <main class="main-signIn">

        <section class="section-image">
            <img src="../../assets/img/login.svg" class="anime-bottom" alt="">
        </section>

        <section class="section-form">
            <form class="anime-left">

                <div class="title">
                    <img src="../../assets/img/logo.png" alt="">
                    <strong>
                        Bem-vindo ao Gym<span>Flow</span>
                    </strong>
                </div>

                <small class="description">
                    Inicie sessão na sua conta para continuar usando o GymFlow! 
                </small>

                <div class="input-label">
                    <label>Email ou N º BI</label>
                    <input 
                        type="text"
                        placeholder="Ex: exempl@gmail.com ou 1234567890"
                        id="email-signIn"
                        required
                    />
                </div>

                <div class="input-label">
                    <label >Senha</label>
                    <input 
                        type="password"
                        placeholder="exemplo@123#"
                        id="password-signIn"
                        required
                    />
                </div>
                
                <a href="../recover-account/index.html">Esqueceu a senha?</a>

                <button class="button-dow" id="button-signIn">Iniciar Sessão</button>

                <p>Não tem conta? Contacte o administrador do ginásio.</p>
                <p>Volte para o site <a href="../index.html">Clique aqui</a></p>
            </form>
        </section>
    </main>

    <script src="./signin.js"></script>
</body>
</html>
