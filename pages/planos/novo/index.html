<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Plano | GymFlow</title>
    <link rel="icon" href="../../../assets/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../../../assets/css/main.css">
    <link rel="stylesheet" href="../planos.css">

    <script type="module" src="../../../assets/js/header.js" defer></script>
    <script type="module" src="./novoPlano.js"></script>

</head>
<body>

    <header>
        <nav class="container nav-header">
            <div class="logo-and-icon">
                <a href="../home/index.html">
                    <img src="../../../assets/img/logo.png" alt="Logo GymFlow">
                    <p>
                        Gym<span>Flow</span> 
                    </p>
                </a>
                <i class="bi bi-sliders"></i>
            </div>
            <div class="news-profile">
                <a href="../news/index.html">
                    <i class="bi bi-bell"></i>
                </a>
               <div class="profile">
                <div class="circle-profile">
                    <a href="#" id="circle-profile-header">
                        ...
                    </a>
                </div>

                <div class="name-level">
                   <a href="../perfil/index.html" class="name" id="first-name">First Name</a>
                   <small class="level" id="role">Admin</small>
                </div>
                
               </div>
            </div>
        </nav>
    </header>

    <main class="container main-planos">

        <section class="section-novo-plano">
            
            <div class="card-title-description anime-bottom">
                <strong>Criar Novo Plano</strong>
                <small>
                    Crie e os planos de assinatura disponíveis para os alunos da academia.
                </small>
            </div>

            <div class="form-add-plano anime-bottom">

                    <div class="input-group">
                        <label for="nome-plano">Nome do Plano</label>
                        <input type="text" id="nome-plano" placeholder="Ex: Plano Mensal">
                    </div>
                    

                    <div class="input-group">
                        <label for="preco">Preço (Kz)</label>
                        <input type="number" id="preco" placeholder="25000">
                    </div>

                    <div class="input-group">
                        <label for="duracao">Duração</label>
                        <select name="duracao" id="duracao-plano">
                            <option value="0" disabled selected>Selecione a duração</option>
                            <option value="01">01 Dia</option>
                            <option value="07">07 Dias</option>
                            <option value="14">14 Dias</option>
                            <option value="21">21 Dias</option>
                            <option value="30">30 Dias</option>
                            <option value="90">90 Dias</option>
                            <option value="180">180 Dias</option>
                            <option value="365">365 Dias</option>
                        </select>
                    </div>
                    
            </div>

            <div class="card-title-description anime-bottom">
                <strong>Exercicos desse Plano</strong>
                <small>
                    Adicione os exercicios que os alunos terão acesso ao se inscreverem nesse plano.
                </small>
            </div>

            <div class="form-add-plano anime-bottom">

                    <div class="input-group">
                        <label for="nome-plano">Exercicio 01</label>
                        <input type="text" class="exercicio-item" placeholder="Ex: Treino de Peito">
                    </div>

                    <div class="input-group">
                        <label for="nome-plano">Exercicio 02</label>
                        <input type="text" class="exercicio-item" placeholder="Ex: Treino de Costas">
                    </div>

                    <div class="input-group">
                        <label for="nome-plano">Exercicio 03</label>
                        <input type="text" class="exercicio-item" placeholder="Ex: Treino de Pernas">
                    </div>

                    <div class="input-group">
                        <label for="nome-plano">Exercicio 04</label>
                        <input type="text" class="exercicio-item" placeholder="Ex: Treino de Braços">
                    </div>

                    <div class="input-group">
                        <label for="nome-plano">Exercicio 05</label>
                        <input type="text" class="exercicio-item" placeholder="Ex: Treino de Ombros">
                    </div>
                    
            </div>


            <div class="card-btns anime-bottom">
                <button 
                    class="btn-submit-plano"
                    id="btn-submit-plano"
                />
                    Criar Plano
                </button>
                <a href="../index.html" class="btn-cancelar-plano">Cancelar</a>
            </div>

            

        </section>

    </main>

</body>
</html>
