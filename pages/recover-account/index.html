<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupera sua conta | GymSoft</title>
    <link rel="icon" href="../../assets/img/logo.png" type="image/png" />
    <link rel="stylesheet" href="../../assets/css/main.css" />
    <link rel="stylesheet" href="./recover-account.css" />
</head>

<body>
    <main class="main-recover-account">

        <section class="section-image">
            <img src="../../assets/img/recover-account.svg" class="anime-bottom" alt="">
        </section>

        <section class="section-form">
            <form class="anime-left">

                <div class="title">
                    <img src="../../assets/img/logo.png" alt="">
                    <strong>
                        Recupere  sua conta Gym<span>Flow</span>
                    </strong>
                </div>

                <small class="description">
                    Insira o email associado à sua conta para receber instruções de recuperação de senha.
                </small>

                <div class="input-label">
                    <label>Email</label>
                    <input 
                        type="text"
                        placeholder="Ex: exempl@gmail.com"
                        required
                    />
                </div>
                <a href="../signIn/index.html">Volte para o login! <span>Clique aqui!</span></a>
                
                <button class="button-dow" >Solicitar a Recuperação</button>

                <p>Volte para o site <a href="../index.html">Clique aqui</a></p>
            </form>
        </section>
    </main>
</body>
</html>
