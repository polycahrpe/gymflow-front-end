<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Pagamento | GymFlow</title>
    <link rel="icon" href="../../../assets/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../../../assets/css/main.css">
    <link rel="stylesheet" href=".././pagamentos.css">

    <script type="module" src="../../../assets/js/header.js" defer></script>
    <script type="module" src="./editarPagamento.js" defer></script>

</head>
<body>

    <header>
        <nav class="container nav-header">
            <div class="logo-and-icon">
                <a href="../../home/index.html">
                    <img src="../../../assets/img/logo.png" alt="Logo GymFlow">
                    <p>
                        Gym<span>Flow</span> 
                    </p>
                </a>
                <i class="bi bi-sliders"></i>
            </div>
            <div class="news-profile">
                <a href="../../news/index.html">
                    <i class="bi bi-bell"></i>
                </a>
               <div class="profile">
                <div class="circle-profile">
                    <a href="#" id="circle-profile-header">
                        ...
                    </a>
                </div>

                <div class="name-level">
                   <a href="../../perfil/index.html" class="name" id="first-name">First Name</a>
                   <small class="level" id="role">Admin</small>
                </div>
                
               </div>
            </div>
        </nav>
    </header>


    <main class="container main-pagamentos">


        <section class="section-editar-pagamentos">

            <div class="card-search-and-btnadd anime-bottom">

                <a class="link-add" href="../index.html">
                    <i class="bi bi-arrow-left"></i>
                    <span>Voltar</span>
                </a>

            </div>
            
            <div class="card-title-description anime-bottom">
                <strong>Editar Pagamento</strong>
                <small>
                    Aqui você pode editar um pagamento existente, atualizando as informações conforme necessário.
                </small>
            </div>

            <article class="card-add-pagamento anime-bottom">

                <div class="card-data-aluno anime-bottom" id="card-data-aluno">

                    <div class="img-name-aluno">

                        <div class="img">
                            <div>
                                <span id="initials-aluno-editar-pagamento">...</span>
                            </div>
                        </div>

                        <div class="name">
                            <strong id="nome-aluno-editar-pagamento">...</strong>
                            <small id="email-aluno-editar-pagamento">...</small>
                        </div>

                    </div>

                    <div class="desc-plano-pagamento">
                        <strong class="title">Plano de Pagamento</strong>

                        <ul>
                            <li>
                                <strong>Nome</strong>
                                <span id="nome-plano-editar-pagamento">...</span>
                            </li>
                            <li>
                                <strong>Valor</strong>
                                <span id="valor-plano-editar-pagamento">...</span>
                            </li>
                            <li>
                                <strong>Prazo</strong>
                                <span id="prazo-plano-editar-pagamento">...</span>
                            </li>
                        </ul>
                    </div>

                    <div class="desc-plano-pagamento">
                        <strong class="title">Editar Pagamento</strong>

                        <div class="input-group-button">

                            <div class="input-group">
                                <label for="Aluno">Valor Pago</label>
                                <input type="text" id="valor-editar-pagamento" placeholder="...">
                            </div>

                            <div class="input-group">
                                <label for="Aluno">Data de Pagamento</label>
                                <input type="date" id="data-editar-pagamento" placeholder="dd/mm/aaaa" disabled>
                            </div>

                            <div class="input-group">
                                <label for="Aluno">Observação</label>
                                <textarea name="observacao" id="observacao-editar-pagamento" placeholder="Digite uma observação..."></textarea>
                            </div> 

                            <button id="btn-submit-pagamento">Registar</button>
                        </div>
                    </div>

                </div>

            </article>

        </section>

    </main>

</body>
</html>
