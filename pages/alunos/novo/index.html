<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Aluno | GymFlow</title>
    <link rel="icon" type="image/png" href="../../../assets//img/logo.png">
    <link rel="stylesheet" href="../../../assets/css/main.css">
    <link rel="stylesheet" href="../alunos.css">

    <script type="module" src="../../../assets/js/header.js" defer></script>
    <script type="module" src="./novoAluno.js" defer></script>

</head>
<body>
   
    <header>
        <nav class="container nav-header">
            <div class="logo-and-icon">
                <a href="../home/index.html">
                    <img src="../../../assets/img/logo.png" alt="Logo GymFlow">
                    <p>
                        Gym<span>Flow</span> 
                    </p>
                </a>
                <i class="bi bi-sliders"></i>
            </div>
            <div class="news-profile">
                <a href="../news/index.html">
                    <i class="bi bi-bell"></i>
                </a>
               <div class="profile">
                <div class="circle-profile">
                    <a href="#" id="circle-profile-header">
                        ...
                    </a>
                </div>

                <div class="name-level">
                   <a href="../perfil/index.html" class="name" id="first-name">First Name</a>
                   <small class="level" id="role">Admin</small>
                </div>
                
               </div>
            </div>
        </nav>
    </header>


    <main class="container main-alunos">


        <section class="section-alunos">
            
            <div class="card-title-description anime-bottom">
                <strong>Cadastrar Novo Aluno</strong>
                <small>
                    Preenche os campos para cadastrar um novo aluno na plataforma Gymflow.
                </small>
            </div>

            <div class="card-search-and-btnadd anime-bottom">

                <a class="link-add" href="../index.html">
                    <i class="bi bi-arrow-left"></i>
                    <span>Voltar</span>
                </a>

            </div>

            <div class="form-aluno anime-bottom">

                <div class="card-inputs">

                    <div class="input-label">
                        <label for="#">Nome completo</label>
                        <input 
                            type="text"
                            placeholder="Ex: Jorge Lopes"
                            required
                        />
                    </div>
    
                    <div class="input-label">
                        <label for="#">Email</label>
                        <input 
                            type="email"
                            placeholder="exemplo@gmail.com"
                            required
                        />
                    </div>
    
                    <div class="input-label">
                        <label for="#">Plano</label>
                        <select name="" id="">
                            <option value="" selected>Selecione o plano</option>
                            <option value="250000">25.000 kz</option>
                            <option value="400000">40.000 kz</option>
                            <option value="800000">80.000 kz</option>
                        </select>
                    </div>
    
                    <div class="input-label">
                        <label for="#">Coach</label>
                        <select name="" id="">
                            <option value="" selected>Selecione o coach</option>
                            <option value="Joao">João</option>
                            <option value="Helena">Helena</option>
                            <option value="Leandro">Leandro</option>
                        </select>
                    </div>
    
                    <div class="input-label">
                        <label for="#">Data inícial</label>
                        <input 
                            type="date"
                            required
                        />
                    </div>
    
                    <div class="input-label">
                        <label for="#">Senha</label>
                        <input 
                            type="password"
                            placeholder="Crie uma senha inícial"
                            required
                        />
                    </div>

                </div>


                <div class="card-btns anime-bottom">
                    <button type="submit" class="btn-submit-aluno">Registrar</button>
                    <a href="../index.html" class="btn-cancelar-aluno">Cancelar</a>
                </div>

            </div>


        </section>

    </main>
</body>
</html>
